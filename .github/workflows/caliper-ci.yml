name: Caliper CI

# Monorepo-root workflow (GitHub only recognises workflows under the repository
# root .github/workflows/). Scoped to the Caliper/ subtree so it never runs for
# unrelated sibling-project changes.

on:
  push:
    paths: ["Caliper/**", ".github/workflows/caliper-ci.yml"]
  pull_request:
    paths: ["Caliper/**", ".github/workflows/caliper-ci.yml"]

defaults:
  run:
    working-directory: Caliper

jobs:
  core:
    name: core (numpy) py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest, numpy-only core)
        run: pytest -q
      - name: Examples (numpy, fixed seed)
        run: |
          python examples/ruler_demo.py
          python examples/conformal_demo.py
          python -m caliper.benchmark --quick
          python examples/benchmark_report.py

  estimator:
    name: estimator (torch) py3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + estimator + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[estimator,dev]"
      - name: Test (pytest, full incl. MAF)
        run: pytest -q
      - name: MAF example (fixed seed)
        run: python examples/demo.py
