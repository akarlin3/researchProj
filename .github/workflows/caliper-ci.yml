name: Caliper CI

# Monorepo-root workflow (GitHub only recognises workflows under the repository
# root .github/workflows/). Scoped to the Caliper/ subtree so it never runs for
# unrelated sibling-project changes.

on:
  push:
    paths: ["Caliper/**", ".github/workflows/caliper-ci.yml"]
  pull_request:
    paths: ["Caliper/**", ".github/workflows/caliper-ci.yml"]

defaults:
  run:
    working-directory: Caliper

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest, numpy-only core)
        run: pytest -q
