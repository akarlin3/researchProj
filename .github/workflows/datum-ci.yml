name: Datum CI

# Monorepo-root workflow (GitHub only recognises workflows under the repository
# root .github/workflows/). Scoped to the Datum/ subtree (plus its read-only
# siblings it imports) so it never runs for unrelated sibling-project changes.

on:
  push:
    paths: ["Datum/**", "Caliper/**", "Gauge/**", ".github/workflows/datum-ci.yml"]
  pull_request:
    paths: ["Datum/**", "Caliper/**", "Gauge/**", ".github/workflows/datum-ci.yml"]

jobs:
  core:
    name: core (numpy+scipy) py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (Datum core + dev; Caliper/Gauge resolved via sibling bootstrap)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./Datum[dev]"
      - name: Lint (ruff)
        run: ruff check Datum
      - name: Test (pytest)
        run: pytest Datum/tests -q
      - name: Worked example (gauge QR submission, tiny)
        run: python Datum/examples/submit_demo.py --quick
      - name: Wiring smoke (manifest + substrate -> ruler)
        run: python Datum/revalidate.py

  estimator:
    name: estimator (torch MAF path) py3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (Datum + baselines + estimator extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./Datum[dev,baselines,estimator]"
      - name: MAF/torch path smoke (reduced cohort)
        run: |
          python - <<'PY'
          import sys
          from dataclasses import replace
          sys.path.insert(0, "Datum")
          from datum import run as R
          from datum.task import TASK_V1
          task = replace(TASK_V1, n_train=600, n_cal=400, n_test=400, n_bootstrap=20)
          rows, meta = R.run_benchmark(task=task, include=["maf_raw", "maf_cqr"], verbose=True)
          print("rows:", len(rows), "skipped:", meta["skipped"])
          assert rows or meta["skipped"], "MAF path neither produced rows nor skipped"
          print("MAF/torch path exercised OK (PROVISIONAL numbers, CI smoke)")
          PY
