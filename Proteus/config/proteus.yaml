# Proteus — central config
# Structure-first dark-proteome mining for divergent PET-hydrolase candidates.
# Target LOCAL host: M4 MacBook Air (Apple Silicon, MPS/CPU, no CUDA).
# Every stochastic step (S0 MMseqs2, S3 ESMFold/torch on GCE, docking) MUST read
# random_seed from here — never hardcode a seed in stage code.

# ---------------------------------------------------------------------------
# Global reproducibility
# ---------------------------------------------------------------------------
random_seed: 1729            # referenced by every stochastic stage (S0, S3, docking)

# ---------------------------------------------------------------------------
# Device — LOCAL Apple Silicon. mps when available, else cpu. Never cuda locally.
# ---------------------------------------------------------------------------
device: mps                  # mps | cpu  (auto-fallback to cpu if MPS unavailable)

# ---------------------------------------------------------------------------
# Paths (relative to repo root unless absolute)
# ---------------------------------------------------------------------------
paths:
  data_raw:        data/raw
  data_interim:    data/interim
  data_processed:  data/processed
  structures:      structures          # gitignored; fetched controls + folded PDBs returned from GCE
  models:          models              # gitignored; downloaded weights (ProstT5 local; ESMFold lives on GCE)
  controls:        controls
  envlog:          envlog
  # external weight locations (populated when downloaded; left blank to avoid guessing)
  prostt5_weights: ""                  # e.g. "Rostlab/ProstT5" (HF id) or a local cache path
  # NOTE: no esmfold_weights here — ESMFold runs on the GCE burst box, not locally.

# ---------------------------------------------------------------------------
# Corpus selection — which dark-proteome sources to mine
# ---------------------------------------------------------------------------
corpus:
  # Dark-proteome sources, resolved into data/raw shards by `proteus.fetch_corpus`.
  # Each entry is a dict:
  #   {name: <id>, type: uniprot, query: "<UniProtKB query>", limit: <N<=500>}
  #   {name: <id>, type: url,     url: "https://.../shard.fasta(.gz)"}
  # Left empty by default (no network dependency); bulk MGnify/GTDB shards are too
  # large to auto-fetch — point a `url` source at a prepared shard or drop FASTA(.gz)
  # in data/raw directly. Example:
  #   sources:
  #     - {name: sprot_cutinases, type: uniprot, query: "cutinase AND reviewed:true", limit: 50}
  sources: []
  min_length: 80                       # residues; below this, skip
  max_length: 1000                     # length cap; longer seqs chunked on GCE (S3)
  fasta_glob: "data/raw/*.fasta.gz"

# ---------------------------------------------------------------------------
# Stage thresholds
# ---------------------------------------------------------------------------
# S0 — dereplicate (MMseqs2). This is dereplication, NOT a homology gate:
#      we collapse near-identical sequences only; we do NOT filter by similarity
#      to known PETases (that would defeat dark-tail mining).  [LOCAL]
s0_dereplicate:
  min_seq_id: 0.95                     # cluster members at >=95% identity collapse
  coverage: 0.90
  cov_mode: 1

# S1 — ProstT5 sequence -> 3Di tokenization.  [LOCAL]
s1_tokenize:
  batch_size: 16                       # modest: 16 GB unified RAM on the M4 Air is tight
  device: auto                         # auto -> mps if available else cpu (see top-level `device`)

# S2 — Foldseek fold-CLASS triage against the alpha/beta-hydrolase fold (UNSEEDED:
#      we match the fold class, not specific PETase templates).  [LOCAL]
#      DECISION: search against BOTH references — a curated precision set AND a
#      broad AF-DB/PDB set with a fold-class post-filter — and UNION the survivors.
#      (See envlog/env-failures.md "S2 fold-class reference — USE BOTH".)
s2_foldclass_triage:
  target_fold: alpha_beta_hydrolase
  evalue: 0.01                         # Foldseek hit e-value cutoff (<= keeps)
  min_bits: 50                         # minimum Foldseek bit score (>= keeps)
  # Inputs produced by S1/S0 (the Foldseek query DB and the representative FASTA).
  query_db: data/interim/s1_3di/querydb
  representatives_fasta: data/interim/s0_representatives.fasta
  # Outputs.
  shortlist_fasta: data/interim/s2_shortlist.fasta   # shipped UP to GCE (S3)
  triage_tsv: data/interim/s2_triage.tsv             # per-query audit (refs hit, best e/bits)
  # BOTH references (union of survivors). `db` is a PRE-BUILT Foldseek 3Di DB;
  # left blank here to avoid guessing a path — populate per host. For a broad
  # reference, `post_filter.fold_class_allowlist` is a text file of target IDs in
  # `db` that ARE the alpha/beta-hydrolase fold class (one id per line, '#'
  # comments allowed); broad hits to anything NOT on that list are discarded.
  references:
    - name: curated_alpha_beta_hydrolase   # curated ESTHER/representative precision anchors
      kind: curated
      db: ""
    - name: broad_afdb_pdb                  # broad AF-DB/PDB search, fold-class post-filtered
      kind: broad
      db: ""
      post_filter:
        fold_class_allowlist: ""

# S3 — ESMFold batch. RUNS ON GCE, NOT locally. On the Mac this stage is DRY-RUN
#      ONLY: validate the input FASTA and emit a job manifest. NEVER fold on MPS.  [GCE]
s3_fold:
  run_location: gce                   # gce | local-dry-run. Local execution is dry-run only.
  device: cpu                          # the *GCE* device — cpu (no GPU quota) | cuda (when GPU)
  plddt_min: 70.0                      # mean pLDDT cutoff to keep a returned model
  chunk_size: 400                      # residue chunk for long sequences (applied on GCE)
  max_recycles: 3
  manifest_out: data/interim/s3_job_manifest.json

# S4 — catalytic geometry gate: Ser-His-Asp triad + oxyanion hole, on the
#      structures RETURNED from GCE.  [LOCAL]
s4_geometry:
  triad_serine_resname: SER
  triad_his_resname: HIS
  triad_acid_resnames: [ASP, GLU]
  # distance windows (Angstrom) — catalytic triad hydrogen-bonding geometry
  ser_og_his_ne2_max: 3.5              # Ser OG -- His NE2
  his_nd1_acid_max: 3.5                # His ND1 -- Asp/Glu carboxylate O
  oxyanion_hole_max: 3.5               # backbone-NH donor distance to oxyanion position
  # Oxyanion-hole probe: the anion sits in the hemisphere AWAY from the His, in the
  # region ~2.5-3.5 A from Ser OG. We search that shell for the point with the most
  # backbone amide N within oxyanion_hole_max, and require >= oxyanion_min_donors that
  # co-localize there (scattered amides near OG do not count — they must share a point).
  oxyanion_probe_min: 2.5              # Angstrom from Ser OG (near edge of the region)
  oxyanion_probe_max: 3.5             # Angstrom from Ser OG (far edge of the region)
  oxyanion_min_donors: 2               # distinct backbone-NH donors required

# S5 — cleft metrics A-E + two discriminators, control-anchored scoring (scored
#      RELATIVE to the positive controls, not to absolute cutoffs).  [LOCAL]
s5_cleft_filter:
  fpocket_min_pockets: 1
  metrics: [volume, hydrophobicity, depth, polarity, druggability]   # A-E base set
  control_anchor: IsPETase             # reference for relative cleft scoring
  # Positive anchor set for z-scoring (LCC_WT=4EB0 is the LCC positive; 6THS is the
  # S165A trap and is NOT a positive). Calibration centres metrics on these.
  positive_controls: [IsPETase, LCC_WT]
  # Catalytic-pocket selection: pick the fpocket pocket whose centre is nearest the
  # catalytic Ser OG; skip the model if none is within this distance.
  catalytic_pocket_max_dist: 12.0      # Angstrom
  # Added discriminator 1 — active-site EXPOSURE / lid-absence (primary).
  # Robust proxy: peripherality of the catalytic Ser relative to the protein CA
  # centroid. Lid-less PET hydrolases sit on a surface groove (Ser far from the
  # core); lid/gorge enzymes bury the Ser near the core. This avoids the confound
  # that raw OG SASA is dominated by open-vs-closed crystal lid state.
  exposure_metric: peripherality       # peripherality | og_sasa
  # How to express that peripherality. The dark proteome spans all sizes, so the
  # PRODUCTION metric must be size-invariant — an absolute Angstrom distance cannot
  # transfer across proteins of different size. Chosen a priori on principle, NOT
  # tuned to the 6 controls (see the normalization section of calibration-report.md).
  #   percentile : fraction of CA atoms closer to the CA centroid than the catalytic
  #                Ser CA is (0 = dead centre, 1 = most peripheral). Size- AND
  #                shape-invariant. PRODUCTION default.
  #   rg_norm    : (Ser OG -> CA centroid) / Rg, Rg = sqrt(mean_i ||CA_i-centroid||^2).
  #                Dimensionless; size-invariant continuous cross-check.
  #   absolute   : Ser OG -> CA centroid in Angstrom. Size-DEPENDENT; kept for
  #                comparison only — do NOT use in production.
  peripherality_mode: percentile       # percentile | rg_norm | absolute
  sasa_probe_radius: 1.4               # for the reported (diagnostic) OG SASA
  # Added discriminator 2 — aromatic subsites (Trp/Tyr/Phe) flanking the cleft.
  aromatic_resnames: [TRP, TYR, PHE]
  aromatic_shell_min: 6.0              # Angstrom from Ser OG
  aromatic_shell_max: 10.0             # Angstrom from Ser OG
  # Composite weights (sum to 1). Exposure dominates (the lid-absence signal);
  # druggability/volume separate the big-pocket lipases; aromatics down-weighted
  # because raw aromatic count is noisy and can favour aromatic-gorge esterases.
  weights:
    exposure: 0.40
    druggability: 0.20
    depth: 0.10
    volume: 0.10
    hydrophobicity: 0.075
    polarity: 0.075
    aromatics: 0.05
  # PETase-favourable orientation per metric, set from biology (NOT tuned to the 6
  # controls): +1 higher is more PETase-like, -1 lower is, 0 penalise deviation from
  # the positive profile (|z|). depth = pocket buriedness (1 - solvent access).
  orientation:
    exposure: 1
    druggability: -1
    depth: -1
    aromatics: 1
    volume: 0
    hydrophobicity: 0
    polarity: 0

# Docking (P4) — small AutoDock Vina pass on the S5/screen survivors: dock a
#      PET-mimic ligand into the catalytic cleft and rank by binding affinity.
#      LOCAL CPU Vina here; GPU docking (GNINA/DiffDock) is a GCE burst (see gce/).
#      The Vina search is seeded from the global random_seed (never hardcoded).
docking:
  ligand: BHET                          # PET-mimic: bis(2-hydroxyethyl) terephthalate
  ligand_pdbqt: ""                      # prepared ligand PDBQT (host-local; blank => prep first, e.g. via Meeko)
  box_center: catalytic_ser_og          # catalytic_ser_og | pocket_center — box centred on the active site
  box_size: [20.0, 20.0, 20.0]          # Angstrom search box (x,y,z)
  exhaustiveness: 8
  n_poses: 9
  top_n: 25                             # keep the best N candidates by affinity (most negative kcal/mol)

# ---------------------------------------------------------------------------
# Compute split — LOCAL Mac (triage/analysis) vs GCE burst (folding/GPU dock)
# ---------------------------------------------------------------------------
compute:
  local:
    description: "M4 MacBook Air (Apple Silicon, MPS/CPU, no CUDA, 16 GB unified). Runs S0–S2 narrowing, S4–S5 geometry/cleft, small Vina docking."
    device: mps                        # mps | cpu
  gce_burst:
    description: "Google Compute Engine burst: ESMFold batch fold (S3). CPU fold (no GPU quota in this project) on a C4 VM; the narrowed S2 shortlist is small enough to fold on CPU. Only the shortlist is shipped up."
    dockerfile: gce/Dockerfile.fold     # build context for the fold image (push to Artifact Registry)
    # Burst launch parameters (proteus.launch plans the up-fold-down cycle from these).
    project: "projproteus"              # GCP project id
    zone: us-central1-a
    instance_name: proteus-fold
    # CPU fold: ESMFold runs fp32 on CPU, so RAM is the binding constraint (~30-40 GB for
    # typical lengths, more for long seqs). c4-highmem-8 = 8 vCPU / 62 GB gives headroom.
    machine_type: c4-highmem-8          # bump to c4-highmem-16 if OOM on long sequences
    # GPU is OFF (empty accelerator => proteus.launch builds the CPU plan: COS image, no
    # --gpus). To switch to GPU once quota is granted: set accelerator (e.g. nvidia-tesla-t4
    # on n1-standard-4, or nvidia-l4 on g2-standard-4) and accelerator_count: 1.
    accelerator: ""
    accelerator_count: 0
    image: ""                           # Artifact Registry fold image (e.g. REGION-docker.pkg.dev/PROJ/REPO/proteus-fold:cu124); blank => set per host
    boot_disk_gb: 100
    spot: true                          # SPOT/preemptible for cost; outputs staged to the bucket survive preemption
    bucket: ""                          # gs://BUCKET staging for in/out (set per host); survives a preempted VM
    remote_in: /data/proteus/in         # on-VM dir inputs are gsutil-pulled to before folding
    remote_out: /data/proteus/out       # on-VM dir folded PDBs + pLDDT land in (gsutil-pushed to the bucket)
    local_out: structures/folded        # where the returned models are pulled DOWN to
